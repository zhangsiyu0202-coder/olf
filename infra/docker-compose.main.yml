services:
  postgres:
    image: postgres:16-alpine
    container_name: overleaf-main-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PLATFORM_POSTGRES_DB:-overleaf}
      POSTGRES_USER: ${PLATFORM_POSTGRES_USER:-overleaf}
      POSTGRES_PASSWORD: ${PLATFORM_POSTGRES_PASSWORD:-overleaf_dev_password}
    ports:
      - "${PLATFORM_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_POSTGRES_USER:-overleaf} -d ${PLATFORM_POSTGRES_DB:-overleaf}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: overleaf-main-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ROOT_USER:-overleafminio}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_ROOT_PASSWORD:-overleafminiosecret}
    ports:
      - "${PLATFORM_MINIO_PORT:-9010}:9000"
      - "${PLATFORM_MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 ${PLATFORM_MINIO_ROOT_USER:-overleafminio} ${PLATFORM_MINIO_ROOT_PASSWORD:-overleafminiosecret} &&
        mc mb --ignore-existing local/${RUNTIME_BLOB_S3_BUCKET:-overleaf-runtime}

  api:
    image: overleaf/main-api:${MAIN_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    container_name: overleaf-main-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: ${API_PORT:-3000}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-deepseek-chat}
      AI_API_STYLE: ${AI_API_STYLE:-auto}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-15000}
      AI_ENABLE_CONTEXT_OPTIMIZERS: ${AI_ENABLE_CONTEXT_OPTIMIZERS:-1}
      AI_ENABLE_LLMLINGUA: ${AI_ENABLE_LLMLINGUA:-0}
      ALLOW_DEMO_AUTH: ${ALLOW_DEMO_AUTH:-0}
      AUTH_SESSION_TTL_MS: ${AUTH_SESSION_TTL_MS:-2592000000}
      RUNTIME_METADATA_BACKEND: ${RUNTIME_METADATA_BACKEND:-postgres}
      RUNTIME_POSTGRES_URL: postgresql://${PLATFORM_POSTGRES_USER:-overleaf}:${PLATFORM_POSTGRES_PASSWORD:-overleaf_dev_password}@postgres:5432/${PLATFORM_POSTGRES_DB:-overleaf}
      RUNTIME_BLOB_BACKEND: ${RUNTIME_BLOB_BACKEND:-s3}
      RUNTIME_BLOB_S3_ENDPOINT: http://minio:9000
      RUNTIME_BLOB_S3_BUCKET: ${RUNTIME_BLOB_S3_BUCKET:-overleaf-runtime}
      RUNTIME_BLOB_S3_REGION: ${RUNTIME_BLOB_S3_REGION:-us-east-1}
      RUNTIME_BLOB_S3_ACCESS_KEY_ID: ${PLATFORM_MINIO_ROOT_USER:-overleafminio}
      RUNTIME_BLOB_S3_SECRET_ACCESS_KEY: ${PLATFORM_MINIO_ROOT_PASSWORD:-overleafminiosecret}
      RUNTIME_BLOB_S3_FORCE_PATH_STYLE: 1
      PAPER_ASSISTANT_BASE_URL: ${PAPER_ASSISTANT_BASE_URL:?PAPER_ASSISTANT_BASE_URL is required}
      PAPER_ASSISTANT_TIMEOUT_MS: ${PAPER_ASSISTANT_TIMEOUT_MS:-25000}
      COMPILE_EXECUTION_MODE: ${COMPILE_EXECUTION_MODE:-host}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - runtime_data:/app/.runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    image: overleaf/main-worker:${MAIN_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: overleaf-main-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-deepseek-chat}
      RUNTIME_METADATA_BACKEND: ${RUNTIME_METADATA_BACKEND:-postgres}
      RUNTIME_POSTGRES_URL: postgresql://${PLATFORM_POSTGRES_USER:-overleaf}:${PLATFORM_POSTGRES_PASSWORD:-overleaf_dev_password}@postgres:5432/${PLATFORM_POSTGRES_DB:-overleaf}
      RUNTIME_BLOB_BACKEND: ${RUNTIME_BLOB_BACKEND:-s3}
      RUNTIME_BLOB_S3_ENDPOINT: http://minio:9000
      RUNTIME_BLOB_S3_BUCKET: ${RUNTIME_BLOB_S3_BUCKET:-overleaf-runtime}
      RUNTIME_BLOB_S3_REGION: ${RUNTIME_BLOB_S3_REGION:-us-east-1}
      RUNTIME_BLOB_S3_ACCESS_KEY_ID: ${PLATFORM_MINIO_ROOT_USER:-overleafminio}
      RUNTIME_BLOB_S3_SECRET_ACCESS_KEY: ${PLATFORM_MINIO_ROOT_PASSWORD:-overleafminiosecret}
      RUNTIME_BLOB_S3_FORCE_PATH_STYLE: 1
      COMPILE_EXECUTION_MODE: host
      COMPILE_WORKER_ID: docker-worker
    volumes:
      - runtime_data:/app/.runtime

  paper-report-worker:
    image: overleaf/main-paper-report-worker:${MAIN_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    container_name: overleaf-main-paper-report-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    environment:
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-deepseek-chat}
      RUNTIME_METADATA_BACKEND: ${RUNTIME_METADATA_BACKEND:-postgres}
      RUNTIME_POSTGRES_URL: postgresql://${PLATFORM_POSTGRES_USER:-overleaf}:${PLATFORM_POSTGRES_PASSWORD:-overleaf_dev_password}@postgres:5432/${PLATFORM_POSTGRES_DB:-overleaf}
      RUNTIME_BLOB_BACKEND: ${RUNTIME_BLOB_BACKEND:-s3}
      RUNTIME_BLOB_S3_ENDPOINT: http://minio:9000
      RUNTIME_BLOB_S3_BUCKET: ${RUNTIME_BLOB_S3_BUCKET:-overleaf-runtime}
      RUNTIME_BLOB_S3_REGION: ${RUNTIME_BLOB_S3_REGION:-us-east-1}
      RUNTIME_BLOB_S3_ACCESS_KEY_ID: ${PLATFORM_MINIO_ROOT_USER:-overleafminio}
      RUNTIME_BLOB_S3_SECRET_ACCESS_KEY: ${PLATFORM_MINIO_ROOT_PASSWORD:-overleafminiosecret}
      RUNTIME_BLOB_S3_FORCE_PATH_STYLE: 1
    volumes:
      - runtime_data:/app/.runtime
    command: ["node", "workers/paper-report/src/worker.js"]

volumes:
  postgres_data:
  minio_data:
  runtime_data:
