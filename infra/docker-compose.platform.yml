services:
  postgres:
    image: postgres:16-alpine
    container_name: overleaf-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PLATFORM_POSTGRES_DB:-overleaf}
      POSTGRES_USER: ${PLATFORM_POSTGRES_USER:-overleaf}
      POSTGRES_PASSWORD: ${PLATFORM_POSTGRES_PASSWORD:-overleaf_dev_password}
    ports:
      - "${PLATFORM_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_POSTGRES_USER:-overleaf} -d ${PLATFORM_POSTGRES_DB:-overleaf}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: overleaf-platform-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ROOT_USER:-overleafminio}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_ROOT_PASSWORD:-overleafminiosecret}
    ports:
      - "${PLATFORM_MINIO_PORT:-9010}:9000"
      - "${PLATFORM_MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  minio_data:
